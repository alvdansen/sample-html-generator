# Source: docs.astral.sh/uv/guides/integration/github (verified 2026-07-09)
name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false           # report every Python version, don't cancel siblings on first failure
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    name: test (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}   # pin uv to this matrix Python
      - name: Install the project
        run: uv sync --locked --all-extras --dev
      - name: Run tests
        run: uv run pytest
